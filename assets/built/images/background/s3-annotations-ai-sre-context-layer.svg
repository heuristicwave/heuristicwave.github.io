<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">S3 Annotations AI SRE context layer</title>
  <desc id="desc">A comparison diagram showing raw logs, raw change context, S3 annotation graph, and signal summary for AI SRE root cause analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#172033"/>
      <stop offset="1" stop-color="#082f49"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb454"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#cbd5e1"/>
    </marker>
    <style>
      .title { font: 800 42px Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 600 21px Arial, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .card-title { font: 800 24px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .card-text { font: 600 17px Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .dark-title { font: 800 24px Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .badge { font: 800 18px Arial, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .mono { font: 700 15px Menlo, Consolas, monospace; fill: #e2e8f0; letter-spacing: 0; }
      .line { stroke: #cbd5e1; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); opacity: 0.82; }
      .panel { fill: #f8fafc; stroke: #dbeafe; stroke-width: 2; }
      .dark-panel { fill: #111827; stroke: #475569; stroke-width: 2; }
      .chip { fill: #0f766e; stroke: #5eead4; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>

  <text class="title" x="600" y="78" text-anchor="middle">AI SRE context layer</text>
  <text class="subtitle" x="600" y="112" text-anchor="middle">Raw ops context vs S3 annotation graph</text>

  <g filter="url(#softShadow)">
    <rect class="panel" x="70" y="180" width="275" height="250" rx="14"/>
    <text class="card-title" x="100" y="224">Raw path</text>
    <rect x="100" y="248" width="210" height="38" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
    <text class="card-text" x="118" y="273">application logs</text>
    <rect x="100" y="298" width="210" height="38" rx="8" fill="#ffedd5" stroke="#fdba74"/>
    <text class="card-text" x="118" y="323">ops context</text>
    <rect x="100" y="348" width="210" height="38" rx="8" fill="#fef9c3" stroke="#fde68a"/>
    <text class="card-text" x="118" y="373">metrics + runbook</text>
    <text class="card-text" x="100" y="412">broad context input</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="dark-panel" x="463" y="165" width="274" height="282" rx="16"/>
    <text class="dark-title" x="600" y="210" text-anchor="middle">S3 annotation graph</text>
    <circle cx="600" cy="262" r="44" fill="url(#orange)" stroke="#fed7aa" stroke-width="3"/>
    <text class="badge" x="600" y="258" text-anchor="middle">S3</text>
    <text class="badge" x="600" y="280" text-anchor="middle">object</text>
    <rect x="498" y="338" width="90" height="40" rx="9" class="chip"/>
    <text class="mono" x="543" y="363" text-anchor="middle">deploy</text>
    <rect x="612" y="338" width="90" height="40" rx="9" class="chip"/>
    <text class="mono" x="657" y="363" text-anchor="middle">relation</text>
    <rect x="526" y="390" width="148" height="40" rx="9" class="chip"/>
    <text class="mono" x="600" y="415" text-anchor="middle">telemetry refs</text>
  </g>

  <g filter="url(#softShadow)">
    <rect class="panel" x="855" y="180" width="275" height="250" rx="14"/>
    <text class="card-title" x="885" y="224">Annotation path</text>
    <rect x="885" y="248" width="210" height="38" rx="8" fill="#ccfbf1" stroke="#5eead4"/>
    <text class="card-text" x="903" y="273">selected telemetry</text>
    <rect x="885" y="298" width="210" height="38" rx="8" fill="#dbeafe" stroke="#93c5fd"/>
    <text class="card-text" x="903" y="323">generic signals</text>
    <rect x="885" y="348" width="210" height="38" rx="8" fill="#dcfce7" stroke="#86efac"/>
    <text class="card-text" x="903" y="373">object relations</text>
    <text class="card-text" x="885" y="412">structured context input</text>
  </g>

  <path class="line" d="M346 306 C392 286, 420 270, 460 260"/>
  <path class="line" d="M740 260 C784 270, 816 286, 852 306"/>
</svg>
